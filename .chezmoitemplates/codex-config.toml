# Before editing, read paired dot_codex/modify_private_config.toml and the
# AGENTS.md files governing both paths.
approval_policy = "on-request"
approvals_reviewer = "auto_review"
default_permissions = "development"
experimental_compact_prompt_file = "compact-prompt.md"
model = "gpt-5.6-sol"
model_reasoning_summary = "concise"
project_doc_fallback_filenames = [".claude/CLAUDE.md", "CLAUDE.md"]
web_search = "live"

[desktop]
ambient-suggestions-enabled = false
enabled-reasoning-efforts = ["low", "medium", "high", "xhigh", "ultra", "max"]
# Keep the selected UI behavior when the desktop default writes queue.
followUpQueueMode = "steer"
mac-menu-bar-enabled = false
reduced-motion-preference = "on"
show-context-window-usage = true

[features]
memories = true
# Keep direct networking while the permission profile controls filesystem access.
network_proxy = false
prevent_idle_sleep = true

[permissions.development.filesystem]
# Run commands inside a write-capable sandbox while keeping known credential
# paths unavailable.
":root" = "write"
"~/.claude/.credentials.json*" = "deny"
"~/.codex/auth.json*" = "deny"
"~/.gnupg/private-keys-v1.d" = "deny"
"~/.npmrc*" = "deny"
"~/.ssh/id_*" = "deny"
"~/.zprofile*" = "deny"
"~/.zsh_history*" = "deny"

[permissions.development.filesystem.":workspace_roots"]
"**/.env.*.local" = "deny"
"**/.env.local*" = "deny"
"**/.env" = "deny"

[permissions.development.network]
enabled = true

[permissions.development.network.unix_sockets]
"{{ .chezmoi.homeDir }}/.gnupg/S.gpg-agent.ssh" = "allow"

[mcp_servers.context7]
enabled = true
command = "/opt/homebrew/bin/envchain"
args = ["context7", "npx", "-y", "@upstash/context7-mcp"]

[mcp_servers.node_repl]
args = []
# Keep the desktop-provided ChatGPT runtime path.
command = "/Applications/ChatGPT.app/Contents/Resources/cua_node/bin/node_repl"
startup_timeout_sec = 120

[plugins."browser@openai-bundled"]
enabled = true

[plugins."chrome@openai-bundled"]
enabled = true

[plugins."computer-use@openai-bundled"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = false

[plugins."pdf@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = false

[plugins."sites@openai-bundled"]
enabled = false

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."template-creator@openai-primary-runtime"]
enabled = false

[plugins."visualize@openai-bundled"]
enabled = false
