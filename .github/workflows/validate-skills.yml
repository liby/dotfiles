name: validate-skills

on:
  pull_request:
    paths:
      - ".github/workflows/validate-skills.yml"
      - "dot_agents/skills/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/validate-skills.yml"
      - "dot_agents/skills/**"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      # Static mode only: no ~/.agents tree on the runner (deployed pass skips
      # silently) and no GPG, so encrypted skills are not validated here.
      - run: ruby dot_agents/skills/scripts/validate-skills.rb
