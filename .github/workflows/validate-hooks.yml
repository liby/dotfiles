name: validate-hooks

on:
  pull_request:
    paths:
      - ".github/workflows/validate-hooks.yml"
      - "dot_claude/hooks/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/validate-hooks.yml"
      - "dot_claude/hooks/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - run: |
          for t in dot_claude/hooks/tests/*.test.sh; do
            echo "== $t"
            bash "$t"
          done
