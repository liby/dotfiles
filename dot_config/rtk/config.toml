# Managed by chezmoi — source: dot_config/rtk/config.toml
#
# Why this file exists: rtk's only lossy behavior that hurt code search was its
# grep/rg rewrite (it truncates matches to grep_max_per_file and changes regex
# semantics, e.g. rg 'a|b' -> BSD grep where | is literal). The single meaningful
# change vs rtk defaults is:
#     [hooks] exclude_commands = ["grep", "rg"]
# which passes grep/rg through to the native tools untouched, while still
# rewriting `cat` -> `rtk read` and `git diff` (both lossless) for token savings.
#
# IMPORTANT: rtk rejects a PARTIAL config (missing-field TOML parse error) and
# silently falls back to ALL defaults. Keep every field below present. When rtk
# adds config fields in a future release, regenerate with `rtk config --create`
# and re-apply the exclude_commands line.

[tracking]
enabled = true
history_days = 90

[display]
colors = true
emoji = true
max_width = 120

[filters]
ignore_dirs = [
    ".git",
    "node_modules",
    "target",
    "__pycache__",
    ".venv",
    "vendor",
]
ignore_files = [
    "*.lock",
    "*.min.js",
    "*.min.css",
]

[tee]
enabled = true
mode = "failures"
max_files = 20
max_file_size = 1048576

[telemetry]
enabled = false

[hooks]
exclude_commands = ["grep", "rg"]
transparent_prefixes = []

[limits]
grep_max_results = 200
grep_max_per_file = 25
status_max_files = 15
status_max_untracked = 10
passthrough_max_chars = 2000
