{{- /* chezmoi:modify-template */ -}}
{{- /* Deep-overlay codex-config.toml, replace plugins, and preserve other live
      values. Removing an overlaid key only stops managing it; retire it from
      source and live. Plugin removals apply on render. Emit unchanged input
      when equal to avoid formatting-only drift. */ -}}
{{- $managed := includeTemplate "codex-config.toml" . | fromToml -}}
{{- $stdin := .chezmoi.stdin -}}
{{- $current := $stdin | fromToml -}}
{{- $out := mergeOverwrite (deepCopy $current) $managed -}}
{{- $out = setValueAtPath (list "plugins") (index $managed "plugins") $out -}}
{{- /* Persistent absence: legacy sandbox selectors can override
      default_permissions. Do not add one-time retirements here. */ -}}
{{- if hasKey $out "default_permissions" -}}
  {{- $out = deleteValueAtPath "sandbox_mode" $out -}}
  {{- $out = deleteValueAtPath "sandbox_workspace_write" $out -}}
{{- end -}}
{{- if deepEqual $current $out -}}
  {{- $stdin -}}
{{- else -}}
  {{- $out | toToml -}}
{{- end -}}
